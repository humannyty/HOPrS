<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Management — HOPrS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

{% set active = 'quadtrees' %}
{% include '_nav.html' %}

<div class="page-wide">
  <div class="page-header mt-6">
    <h1>Quadtree Management</h1>
    <p>View, download, or delete stored quadtrees from the database.</p>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Quadtree Reference</th>
          <th>Record Count</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for qt_ref, count in qt_refs_with_counts %}
        <tr>
          <td>{{ qt_ref }}</td>
          <td><span class="badge">{{ count }}</span></td>
          <td>
            <div class="td-actions">
              <form method="GET" action="{{ url_for('quadtrees_bp.download_csv', qt_ref=qt_ref) }}" style="margin:0;">
                <button type="submit" class="btn btn-ghost btn-sm">Download CSV</button>
              </form>
              <form method="POST" action="{{ url_for('quadtrees_bp.delete_quadtrees', qt_ref=qt_ref) }}" style="margin:0;">
                <button type="submit" class="btn btn-danger">Delete</button>
              </form>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <div class="pagination">
    <a href="{{ url_for('quadtrees_bp.list_quadtrees', page=page-1, per_page=per_page) }}"
       {% if page == 1 %}class="disabled"{% endif %}>← Previous</a>
    <a href="{{ url_for('quadtrees_bp.list_quadtrees', page=page+1, per_page=per_page) }}">Next →</a>
  </div>
</div>

</body>
</html>
