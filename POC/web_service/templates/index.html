<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encode — HOPrS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

{% set active = 'encode' %}
{% include '_nav.html' %}

<div class="page">
  <div class="page-header">
    <h1>Image Encoder</h1>
    <p>Upload an image to generate and store its quadtree fingerprint.</p>
  </div>

  <div class="card">
    <form id="upload-form" action="/upload" method="post" enctype="multipart/form-data">

      <div class="form-group">
        <label for="file">Image File</label>
        <input type="file" id="file" name="file" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="depth">Quadtree Depth</label>
          <input type="number" id="depth" name="depth" value="5" required>
        </div>
        <div class="form-group">
          <label for="algorithm">Hash Algorithm</label>
          <select id="algorithm" name="algorithm">
            <option value="pdq">PDQ</option>
          </select>
        </div>
      </div>

      <div class="form-divider"></div>
      <div class="form-section-label">Optional Parameters</div>

      <div class="form-row">
        <div class="form-group">
          <label for="resize">Resize</label>
          <input type="text" id="resize" name="resize" placeholder="width,height">
        </div>
        <div class="form-group">
          <label for="crop">Crop</label>
          <input type="text" id="crop" name="crop" placeholder="x0,y0,x1,y1">
        </div>
      </div>

      <div class="form-group">
        <label for="note">Note</label>
        <input type="text" id="note" name="note" placeholder="Optional label for this entry">
      </div>

      <button type="submit" class="btn btn-primary">Upload &amp; Encode</button>
    </form>
  </div>
</div>

<script>
  document.getElementById('upload-form').onsubmit = function () {
    if (document.getElementById('file').files.length === 0) {
      alert('Please choose a file to upload.');
      return false;
    }
    return true;
  };
</script>
</body>
</html>
