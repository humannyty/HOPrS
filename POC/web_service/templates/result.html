<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Result — HOPrS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

{% include '_nav.html' %}

<div class="page-wide">
  <div class="page-header mt-6">
    <h1>Comparison Result</h1>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Matched Pixels</div>
      <div class="stat-value">{{ stats.matched_pixels }}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Pixels</div>
      <div class="stat-value">{{ stats.total_pixels }}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Proportion</div>
      <div class="stat-value">{{ stats.proportion }}</div>
    </div>
  </div>

  <!-- Image viewer -->
  <div class="card">
    <div class="card-title">Output Images</div>
    <div class="image-tabs">
      <button class="image-tab active" onclick="showImage('highlight',   this)">Highlighted</button>
      <button class="image-tab"        onclick="showImage('comparison',  this)">Comparison</button>
      <button class="image-tab"        onclick="showImage('new',         this)">New Image</button>
      <button class="image-tab"        onclick="showImage('difference',  this)">Difference Mask</button>
    </div>
    <div class="image-frame">
      <img id="highlight"  src="{{ highlight_image }}"  alt="Highlighted Image"  class="active">
      <img id="comparison" src="{{ comparison_image }}" alt="Comparison Image">
      <img id="new"        src="{{ new_image }}"        alt="New Image">
      <img id="difference" src="{{ difference_mask }}"  alt="Difference Mask">
    </div>
  </div>

  <!-- Output files -->
  {% if files %}
  <div class="card mt-4">
    <div class="card-title">Output Files</div>
    <ul style="list-style:none; display:flex; flex-direction:column; gap:6px;">
      {% for file in files %}
      <li class="text-muted">{{ file }}</li>
      {% endfor %}
    </ul>
  </div>
  {% endif %}

  <div class="mt-6">
    <a href="/" class="btn btn-ghost btn-sm">← Back</a>
  </div>
</div>

<script>
  function showImage(id, btn) {
    document.querySelectorAll('.image-frame img').forEach(img => img.classList.remove('active'));
    document.querySelectorAll('.image-tab').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }
</script>
</body>
</html>
