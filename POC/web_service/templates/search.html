<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Search — HOPrS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

{% set active = 'search' %}
{% include '_nav.html' %}

<div class="page">
  <div class="page-header">
    <h1>Database Search</h1>
    <p>Find an image in the database and surface the nearest matches.</p>
  </div>

  <div class="card">
    <form id="search-form" action="/search" method="post" enctype="multipart/form-data">

      <div class="form-group">
        <label for="new_image">Image to Search For</label>
        <input type="file" id="new_image" name="new_image" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="threshold">Threshold</label>
          <input type="number" id="threshold" name="threshold" value="2" required>
        </div>
        <div class="form-group">
          <label for="compare_depth">Compare Depth</label>
          <input type="number" id="compare_depth" name="compare_depth" value="5" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary">Search</button>
    </form>
  </div>
</div>

</body>
</html>
